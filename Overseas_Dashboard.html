<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Overseas Online Tracker PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg:#07111f;
  --panel:#101c30;
  --panel2:#172844;
  --border:#22395f;
  --accent:#00c6ff;
  --green:#00e676;
  --red:#ff4d6d;
  --orange:#ffb347;
  --purple:#b388ff;
  --text:#ecf3ff;
  --text2:#9db4d1;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(180deg,#050b16,#08111f);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
}

/* TOP */

.topbar{
  height:74px;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:#091321;
}

.logo{
  display:flex;
  gap:14px;
  align-items:center;
}

.logo-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:linear-gradient(135deg,#0072ff,#00c6ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.logo-title{
  font-size:24px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  letter-spacing:1px;
}

.logo-sub{
  font-size:11px;
  color:#7d97b9;
}

.live{
  color:var(--green);
  font-size:12px;
}

/* FILTER */

.filters{
  padding:16px 24px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  border-bottom:1px solid var(--border);
  background:#0d1728;
}

select{
  background:var(--panel);
  border:1px solid var(--border);
  color:white;
  padding:10px 12px;
  border-radius:10px;
  min-width:170px;
}

button{
  background:linear-gradient(135deg,#0072ff,#00c6ff);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* MAIN */

.main{
  padding:24px;
}

/* KPI */

.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  margin-bottom:24px;
}

.kpi{
  background:linear-gradient(145deg,#0f1a2f,#152540);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
}

.kpi-top{
  font-size:13px;
  color:var(--text2);
}

.kpi-value{
  font-size:42px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  margin-top:8px;
}

/* GRID */

.grid2{
  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:22px;
  margin-bottom:22px;
}

.panel{
  background:linear-gradient(145deg,#0d182b,#12203a);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
}

.panel-head{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#16253f;
}

.panel-title{
  font-family:'Rajdhani',sans-serif;
  font-size:20px;
  font-weight:700;
}

.panel-body{
  padding:22px;
}

/* MAP */

.map-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.country-card{
  background:#0e1930;
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  transition:0.3s;
}

.country-card:hover{
  transform:translateY(-4px);
  border-color:#00c6ff;
}

.country-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.flag{
  font-size:38px;
}

.country-name{
  font-size:18px;
  font-weight:700;
}

.map-box{
  height:120px;
  border-radius:14px;
  background:
  radial-gradient(circle at center,
  rgba(0,198,255,0.35),
  rgba(0,114,255,0.08));

  border:1px solid rgba(255,255,255,0.06);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:50px;
}

.stats{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#16253f;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.stat-value{
  font-size:22px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
}

.stat-label{
  font-size:11px;
  color:var(--text2);
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:12px;
  font-size:12px;
  color:#7f97ba;
  border-bottom:1px solid var(--border);
}

td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:13px;
}

tr:hover td{
  background:rgba(255,255,255,0.03);
}

.chip{
  padding:4px 10px;
  border-radius:30px;
  font-size:11px;
  font-weight:700;
}

.red{
  background:rgba(255,77,109,0.12);
  color:#ff4d6d;
}

.green{
  background:rgba(0,230,118,0.12);
  color:#00e676;
}

/* CHART */

canvas{
  max-height:350px;
}

/* MOBILE */

@media(max-width:1100px){

  .kpis{
    grid-template-columns:1fr 1fr;
  }

  .grid2{
    grid-template-columns:1fr;
  }

  .map-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="topbar">

  <div class="logo">

    <div class="logo-icon">🎓</div>

    <div>
      <div class="logo-title">OVERSEAS ONLINE TRACKER PRO</div>
      <div class="logo-sub">GLOBAL PERFORMANCE & CALLING ANALYTICS</div>
    </div>

  </div>

  <div class="live">● LIVE SHEET CONNECTED</div>

</div>

<div class="filters">

  <select id="countryFilter" onchange="applyFilters()">
    <option value="">All Countries</option>
  </select>

  <select id="gradeFilter" onchange="applyFilters()">
    <option value="">All Grades</option>
  </select>

  <button onclick="resetFilters()">Reset</button>

</div>

<div class="main">

  <!-- KPI -->

  <div class="kpis">

    <div class="kpi">
      <div class="kpi-top">TOTAL STUDENTS</div>
      <div class="kpi-value" id="kTotal">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-top">PRESENT</div>
      <div class="kpi-value" style="color:var(--green)" id="kPresent">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-top">ABSENT</div>
      <div class="kpi-value" style="color:var(--red)" id="kAbsent">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-top">CALL DONE</div>
      <div class="kpi-value" style="color:var(--accent)" id="kCalled">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-top">AVG %</div>
      <div class="kpi-value" style="color:var(--orange)" id="kAvg">0%</div>
    </div>

  </div>

  <!-- MAPS -->

  <div class="panel" style="margin-bottom:22px;">

    <div class="panel-head">
      <div class="panel-title">GLOBAL COUNTRY MAPS</div>
    </div>

    <div class="panel-body">

      <div class="map-grid" id="mapGrid"></div>

    </div>

  </div>

  <!-- CHART -->

  <div class="grid2">

    <div class="panel">

      <div class="panel-head">
        <div class="panel-title">COUNTRY PERFORMANCE</div>
      </div>

      <div class="panel-body">

        <canvas id="countryChart"></canvas>

      </div>

    </div>

    <div class="panel">

      <div class="panel-head">
        <div class="panel-title">GRADE ANALYTICS</div>
      </div>

      <div class="panel-body">

        <canvas id="gradeChart"></canvas>

      </div>

    </div>

  </div>

  <!-- TABLE -->

  <div class="panel">

    <div class="panel-head">
      <div class="panel-title">PENDING CALL STUDENTS</div>
    </div>

    <div class="panel-body">

      <table>

        <thead>
          <tr>
            <th>Form No</th>
            <th>Name</th>
            <th>Country</th>
            <th>Grade</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="pendingBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

/* ===== GOOGLE SHEET WEB APP URL ===== */

const API =
"https://script.google.com/macros/s/AKfycbwGD8hn_Bpo_qnZOQ5My9_u_R6sb8utNiRvq4ALxkwfwSn6m7W6w8NCkFgtFIbxBYrE/exec";

/* ===== FLAGS ===== */

const FLAGS = {
  UAE:"🇦🇪",
  QATAR:"🇶🇦",
  KUWAIT:"🇰🇼",
  BAHRAIN:"🇧🇭",
  OMAN:"🇴🇲",
  "SAUDI ARABIA":"🇸🇦",
  "NON GCC":"🌍"
};

let DATA = [];
let FILTERED = [];

let countryChart;
let gradeChart;

/* ===== LOAD ===== */

async function loadData(){

  try{

    const res = await fetch(API);

    const raw = await res.json();

    DATA = raw.slice(1).map(r=>{

      const total = r[11];

      const called =
      r[13] && r[13].toString().trim() !== "";

      return{

        form:r[0],
        name:r[1],
        country:(r[2] || "").toUpperCase(),
        grade:r[5],
        rank:r[6],
        total:total,
        attendance:
          total === "AB"
          ? "Absent"
          : "Present",

        called:called

      };

    });

    FILTERED = [...DATA];

    initFilters();

    render();

  }catch(e){

    console.log(e);

  }

}

/* ===== FILTERS ===== */

function initFilters(){

  const countries =
  [...new Set(DATA.map(x=>x.country))];

  const grades =
  [...new Set(DATA.map(x=>x.grade))];

  document.getElementById("countryFilter")
  .innerHTML += countries
  .map(c=>`<option>${c}</option>`)
  .join("");

  document.getElementById("gradeFilter")
  .innerHTML += grades
  .map(g=>`<option>${g}</option>`)
  .join("");

}

function applyFilters(){

  const c =
  document.getElementById("countryFilter").value;

  const g =
  document.getElementById("gradeFilter").value;

  FILTERED = DATA.filter(x=>{

    if(c && x.country !== c)
      return false;

    if(g && x.grade != g)
      return false;

    return true;

  });

  render();

}

function resetFilters(){

  document.getElementById("countryFilter").value="";
  document.getElementById("gradeFilter").value="";

  FILTERED=[...DATA];

  render();

}

/* ===== RENDER ===== */

function render(){

  const total = FILTERED.length;

  const present =
  FILTERED.filter(x=>x.attendance==="Present").length;

  const absent =
  FILTERED.filter(x=>x.attendance==="Absent").length;

  const called =
  FILTERED.filter(x=>x.called).length;

  const scores =
  FILTERED
  .filter(x=>x.attendance==="Present")
  .map(x=>Number(x.total));

  const avg =
  scores.length
  ? (
    scores.reduce((a,b)=>a+b,0)
    / scores.length
  ).toFixed(1)
  : 0;

  /* KPI */

  document.getElementById("kTotal").textContent=total;
  document.getElementById("kPresent").textContent=present;
  document.getElementById("kAbsent").textContent=absent;
  document.getElementById("kCalled").textContent=called;
  document.getElementById("kAvg").textContent=avg+"%";

  /* MAPS */

  const countryMap = {};

  FILTERED.forEach(x=>{

    if(!countryMap[x.country]){

      countryMap[x.country]={
        total:0,
        present:0,
        absent:0,
        called:0
      };

    }

    countryMap[x.country].total++;

    if(x.attendance==="Present")
      countryMap[x.country].present++;

    else
      countryMap[x.country].absent++;

    if(x.called)
      countryMap[x.country].called++;

  });

  document.getElementById("mapGrid").innerHTML =
  Object.keys(countryMap)
  .map(c=>{

    const d = countryMap[c];

    return`

    <div class="country-card">

      <div class="country-top">

        <div>

          <div class="country-name">
            ${c}
          </div>

        </div>

        <div class="flag">
          ${FLAGS[c] || "🌍"}
        </div>

      </div>

      <div class="map-box">
        ${FLAGS[c] || "🌍"}
      </div>

      <div class="stats">

        <div class="stat">
          <div class="stat-value">
            ${d.total}
          </div>
          <div class="stat-label">
            STUDENTS
          </div>
        </div>

        <div class="stat">
          <div class="stat-value" style="color:#00e676">
            ${d.present}
          </div>
          <div class="stat-label">
            PRESENT
          </div>
        </div>

        <div class="stat">
          <div class="stat-value" style="color:#ff4d6d">
            ${d.absent}
          </div>
          <div class="stat-label">
            ABSENT
          </div>
        </div>

        <div class="stat">
          <div class="stat-value" style="color:#00c6ff">
            ${d.called}
          </div>
          <div class="stat-label">
            CALL DONE
          </div>
        </div>

      </div>

    </div>

    `;

  }).join("");

  /* COUNTRY CHART */

  const cLabels =
  Object.keys(countryMap);

  const cData =
  cLabels.map(c=>countryMap[c].total);

  if(countryChart)
    countryChart.destroy();

  countryChart =
  new Chart(
    document.getElementById("countryChart"),
    {
      type:"bar",

      data:{
        labels:cLabels,

        datasets:[{
          label:"Students",
          data:cData,
          borderWidth:1
        }]
      },

      options:{
        responsive:true,
        plugins:{
          legend:{
            labels:{
              color:"white"
            }
          }
        },

        scales:{
          x:{
            ticks:{
              color:"white"
            }
          },

          y:{
            ticks:{
              color:"white"
            }
          }
        }

      }

    }
  );

  /* GRADE */

  const gradeMap={};

  FILTERED.forEach(x=>{

    if(!gradeMap[x.grade])
      gradeMap[x.grade]=0;

    gradeMap[x.grade]++;

  });

  if(gradeChart)
    gradeChart.destroy();

  gradeChart =
  new Chart(
    document.getElementById("gradeChart"),
    {
      type:"doughnut",

      data:{
        labels:Object.keys(gradeMap),

        datasets:[{
          data:Object.values(gradeMap)
        }]
      },

      options:{
        plugins:{
          legend:{
            labels:{
              color:"white"
            }
          }
        }
      }

    }
  );

  /* PENDING */

  const pending =
  FILTERED.filter(x=>!x.called);

  document.getElementById("pendingBody")
  .innerHTML =
  pending.map(x=>`

    <tr>

      <td>${x.form}</td>

      <td>${x.name}</td>

      <td>${FLAGS[x.country] || "🌍"} ${x.country}</td>

      <td>${x.grade}</td>

      <td>
        <span class="chip red">
          Pending
        </span>
      </td>

    </tr>

  `).join("");

}

/* ===== AUTO ===== */

loadData();

setInterval(loadData,60000);

</script>

</body>
</html>
